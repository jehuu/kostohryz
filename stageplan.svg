<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="980" viewBox="0 0 1400 980">
  <defs>
    <style>
      .bg { fill: #f6f3ea; }
      .panel { fill: #fffdf7; stroke: #d8d2c2; stroke-width: 2; }
      .title { font: 700 30px Menlo, Consolas, monospace; fill: #1f1f1f; }
      .label { font: 600 18px Menlo, Consolas, monospace; fill: #1f1f1f; }
      .box { fill: #ffffff; stroke: #2b2b2b; stroke-width: 2; rx: 8; }
      .wire { stroke: #2b2b2b; stroke-width: 3; fill: none; }
      .drums { fill: #d62828; font: 700 18px Menlo, Consolas, monospace; }
      .keys { fill: #0a9396; font: 700 18px Menlo, Consolas, monospace; }
      .guitar { fill: #1d4ed8; font: 700 18px Menlo, Consolas, monospace; }
      .vocal { fill: #2a9d8f; font: 700 18px Menlo, Consolas, monospace; }
      .mixers { fill: #9a7b00; font: 700 18px Menlo, Consolas, monospace; }
      .mono { font: 500 14px Menlo, Consolas, monospace; fill: #333; }
      .legendBox { fill: #fff; stroke: #ddd; stroke-width: 1; rx: 6; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="980" />
  <rect class="panel" x="30" y="24" width="1340" height="932" rx="14" />

  <text class="title" x="80" y="72">KOSTOHRYZ STAGEPLAN</text>

  <text class="label" x="700" y="132" text-anchor="middle">UPSTAGE</text>
  <rect x="80" y="150" width="1240" height="620" fill="#fff" stroke="#2b2b2b" stroke-width="3" />
  <text class="label" x="700" y="812" text-anchor="middle">DOWNSTAGE</text>

  <!-- Amps -->
  <rect class="box" x="120" y="190" width="210" height="44" />
  <text class="guitar" x="225" y="218" text-anchor="middle">AMP 1 + CAB 1</text>

  <rect class="box" x="1070" y="190" width="210" height="44" />
  <text class="guitar" x="1175" y="218" text-anchor="middle">AMP 2 + CAB 2</text>

  <!-- Center drums -->
  <rect class="box" x="565" y="290" width="270" height="40" />
  <text class="drums" x="700" y="316" text-anchor="middle">DRUM TRIGGERS</text>

  <rect class="box" x="615" y="350" width="170" height="42" />
  <text class="drums" x="700" y="378" text-anchor="middle">DRUMS</text>

  <rect class="box" x="860" y="350" width="170" height="42" />
  <text class="mixers" x="945" y="378" text-anchor="middle">MIXER 2</text>

  <!-- Left group -->
  <rect class="box" x="120" y="500" width="120" height="40" />
  <text class="keys" x="180" y="526" text-anchor="middle">KEYS</text>

  <rect class="box" x="290" y="500" width="170" height="40" />
  <text class="mixers" x="375" y="526" text-anchor="middle">MIXER 1</text>

  <rect class="box" x="120" y="560" width="180" height="40" />
  <text class="keys" x="210" y="586" text-anchor="middle">NOISE RIG</text>

  <rect class="box" x="120" y="620" width="180" height="40" />
  <text class="keys" x="210" y="646" text-anchor="middle">SAXOPHONE</text>

  <!-- Right group -->
  <rect class="box" x="1110" y="500" width="150" height="40" />
  <text class="guitar" x="1185" y="526" text-anchor="middle">GUITAR</text>

  <rect class="box" x="980" y="560" width="280" height="40" />
  <text class="guitar" x="1120" y="586" text-anchor="middle">GUITAR PEDALBOARD</text>

  <!-- Vocal + monitors -->
  <rect class="box" x="615" y="690" width="170" height="40" />
  <text class="vocal" x="700" y="716" text-anchor="middle">VOCAL MIC</text>

  <rect class="box" x="200" y="740" width="140" height="34" />
  <text class="vocal" x="270" y="762" text-anchor="middle">MONITOR</text>
  <rect class="box" x="630" y="740" width="140" height="34" />
  <text class="vocal" x="700" y="762" text-anchor="middle">MONITOR</text>
  <rect class="box" x="1060" y="740" width="140" height="34" />
  <text class="vocal" x="1130" y="762" text-anchor="middle">MONITOR</text>

  <!-- Wiring -->
  <!-- Guitar pedalboard split to both amps -->
  <path class="wire" d="M1120 560 V250 H225" />
  <path class="wire" d="M1160 560 V250 H1175" />

  <!-- Drum triggers and drums to mixer 2 -->
  <path class="wire" d="M835 310 H900 V370" />
  <path class="wire" d="M785 370 H860" />

  <!-- Keys/noise to mixer 1, then mixer 2 -->
  <path class="wire" d="M240 520 H290" />
  <path class="wire" d="M300 580 H290 V520" />
  <path class="wire" d="M460 520 H860" />

  <!-- Legend -->
  <text class="label" x="80" y="880">GROUP COLOR KEY</text>

  <rect class="legendBox" x="80" y="900" width="220" height="34" />
  <text class="drums" x="190" y="922" text-anchor="middle">DRUMS - RED</text>

  <rect class="legendBox" x="320" y="900" width="250" height="34" />
  <text class="keys" x="445" y="922" text-anchor="middle">KEYS / NOISE - CYAN</text>

  <rect class="legendBox" x="590" y="900" width="220" height="34" />
  <text class="guitar" x="700" y="922" text-anchor="middle">GUITAR - BLUE</text>

  <rect class="legendBox" x="830" y="900" width="220" height="34" />
  <text class="vocal" x="940" y="922" text-anchor="middle">VOCAL - GREEN</text>

  <rect class="legendBox" x="1070" y="900" width="220" height="34" />
  <text class="mixers" x="1180" y="922" text-anchor="middle">MIXERS - YELLOW</text>
</svg>
